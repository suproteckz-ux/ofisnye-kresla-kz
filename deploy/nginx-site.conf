# ════════════════════════════════════════════════════════════════
# /etc/nginx/sites-available/your-domain.kz
# ИСПРАВЛЕНИЕ DO-2: limit_req применены ко всем нужным location
# ════════════════════════════════════════════════════════════════

# HTTP → HTTPS
server {
    listen 80;
    server_name your-domain.kz www.your-domain.kz;
    return 301 https://your-domain.kz$request_uri;
}

# www → non-www
server {
    listen 443 ssl http2;
    server_name www.your-domain.kz;

    ssl_certificate     /etc/letsencrypt/live/your-domain.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.kz/privkey.pem;

    return 301 https://your-domain.kz$request_uri;
}

# Основной сервер
server {
    listen 443 ssl http2;
    server_name your-domain.kz;

    root /var/www/your-domain.kz/public;
    index index.php;

    # ── SSL ──────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/your-domain.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.kz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Размер загружаемых файлов (для импорта Excel 50MB) ────────
    client_max_body_size 55M;

    # ── Блокировка скрытых файлов ─────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Блокировка .env ───────────────────────────────────────────
    location ~ ^/(\.env|\.git|storage/app) {
        deny all;
        return 404;
    }

    # ── Статика: кэш 1 год ────────────────────────────────────────
    location ~* \.(css|js|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Rate limit для заявок (ИСПРАВЛЕНИЕ DO-2) ─────────────────
    # 1 заявка в минуту, burst=3 (допускаем 3 заявки подряд)
    location = /lead {
        limit_req zone=leads burst=3 nodelay;
        # 429 Too Many Requests при превышении
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Rate limit для поиска ─────────────────────────────────────
    location = /search {
        limit_req zone=search burst=10 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Filament admin: отдельная зона ───────────────────────────
    location ^~ /admin {
        limit_req zone=admin burst=30 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Livewire polling: не ограничиваем жёстко ─────────────────
    location ^~ /livewire {
        limit_req zone=admin burst=50 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Общие публичные маршруты ──────────────────────────────────
    location / {
        limit_req zone=general burst=50 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_connect_timeout 60s;
        fastcgi_read_timeout    120s;
        fastcgi_send_timeout    120s;

        fastcgi_buffer_size         128k;
        fastcgi_buffers             4 256k;
        fastcgi_busy_buffers_size   256k;

        # Кастомный ответ при 429 от PHP (Laravel rate limit)
        fastcgi_intercept_errors off;
    }

    # ── Кастомные страницы ошибок ─────────────────────────────────
    error_page 429 /429.html;
    error_page 404 /index.php;
    error_page 500 502 503 504 /index.php;

    # ── Логи ──────────────────────────────────────────────────────
    access_log /var/log/nginx/chairs-almaty-access.log;
    error_log  /var/log/nginx/chairs-almaty-error.log warn;
}
