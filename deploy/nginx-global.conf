# ════════════════════════════════════════════════════════════════
# /etc/nginx/nginx.conf — глобальная конфигурация
# ИСПРАВЛЕНИЕ DO-2: limit_req_zone перенесены из комментария в http{}
# ════════════════════════════════════════════════════════════════

user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    # ── Базовые настройки ─────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;         # Скрываем версию nginx

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Логи ──────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip сжатие ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Rate Limiting зоны (ИСПРАВЛЕНИЕ DO-2) ────────────────────
    # Зона для заявок: 1 запрос в минуту с одного IP
    limit_req_zone $binary_remote_addr zone=leads:10m rate=1r/m;

    # Зона для общих запросов: 30 запросов в секунду
    limit_req_zone $binary_remote_addr zone=general:20m rate=30r/s;

    # Зона для поиска: 5 запросов в секунду
    limit_req_zone $binary_remote_addr zone=search:10m rate=5r/s;

    # Зона для Filament API (Livewire polling): 20 запросов в секунду
    limit_req_zone $binary_remote_addr zone=admin:10m rate=20r/s;

    # Статус по умолчанию при превышении лимита
    limit_req_status 429;

    # ── Включение site-конфигов ───────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
